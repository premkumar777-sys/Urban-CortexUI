<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Cortex AI — Fleet Management</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        .fleet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .truck-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: all 0.2s ease;
            animation: cardEntry 0.4s ease both;
        }

        .truck-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .truck-card.active {
            border-left: 3px solid var(--success);
        }

        .truck-card.idle {
            border-left: 3px solid var(--text-muted);
        }

        .truck-card.maintenance {
            border-left: 3px solid var(--warning);
        }

        .truck-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .truck-id {
            font-size: 16px;
            font-weight: 800;
        }

        .truck-driver {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        #fleet-map {
            height: 360px;
        }

        .capacity-bar-wrap {
            margin-top: 12px;
        }

        .capacity-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="UCComponents.toggleSidebar()"></div>
        <aside class="sidebar" id="sidebar">
            <div id="sidebar-content"></div>
        </aside>
        <div class="main-content">
            <header class="topbar" id="topbar"></header>
            <main class="page-content">
                <!-- Header -->
                <div
                    style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
                    <div>
                        <div style="font-size:22px;font-weight:900;letter-spacing:-0.5px;">Fleet Management</div>
                        <div style="font-size:13px;color:var(--text-secondary);margin-top:3px;">5 trucks · 3 active · 1
                            idle · 1 maintenance</div>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-secondary btn-sm"
                            onclick="toast.info('Adding truck','Feature coming soon',2000)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            Add Truck
                        </button>
                        <button class="btn btn-primary btn-sm"
                            onclick="toast.success('Routes dispatched','All active trucks received updated routes',3000)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3" />
                            </svg>
                            Dispatch All
                        </button>
                    </div>
                </div>

                <!-- Truck Cards -->
                <div class="fleet-grid" id="fleet-grid"></div>

                <!-- Fleet Map -->
                <div class="card">
                    <div class="card-header">
                        <div>
                            <div class="card-title">Fleet Location Map</div>
                            <div style="font-size:12px;color:var(--text-secondary);">Live GPS positions</div>
                        </div>
                        <span class="badge badge-success" style="display:inline-flex;align-items:center;gap:5px;">
                            <span
                                style="width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulseDot 1.4s ease-in-out infinite;"></span>
                            Live
                        </span>
                    </div>
                    <div id="fleet-map" class="map-container"></div>
                </div>
            </main>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/simulation.js"></script>
    <script src="../js/components.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const user = UCAuth.requireAuth(['admin']);
        UCComponents.initTheme();
        document.getElementById('sidebar-content').innerHTML = UCComponents.renderSidebar('fleet');
        document.getElementById('topbar').innerHTML = UCComponents.renderTopbar('Fleet Management', 'Track and manage all collection trucks');

        const statusLabels = { active: 'Active', idle: 'Idle', maintenance: 'Maintenance' };

        function renderFleetCards() {
            document.getElementById('fleet-grid').innerHTML = UCData.trucks.map((truck, i) => {
                const capColor = truck.capacity > 80 ? 'var(--danger)' : truck.capacity > 50 ? 'var(--warning)' : 'var(--success)';
                const routeInfo = truck.route ? UCData.routes.find(r => r.id === truck.route) : null;
                return `
        <div class="truck-card ${truck.status}" style="animation-delay:${i * 0.07}s;">
          <div class="truck-header">
            <div>
              <div class="truck-id">🚛 ${truck.id}</div>
              <div class="truck-driver">${truck.driver}</div>
            </div>
            <span class="badge ${UCData.getStatusBadge(truck.status)}">${statusLabels[truck.status]}</span>
          </div>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">${truck.license}</div>
          <div class="capacity-bar-wrap">
            <div class="capacity-label">
              <span style="font-size:12px;color:var(--text-secondary);">Capacity</span>
              <span style="font-size:13px;font-weight:700;color:${capColor};">${truck.capacity}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${truck.capacity}%;background:${capColor};"></div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:14px;">
            <div style="text-align:center;">
              <div style="font-size:16px;font-weight:800;">${truck.binsCollected}</div>
              <div style="font-size:11px;color:var(--text-muted);">Collected</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:16px;font-weight:800;">${truck.totalBins}</div>
              <div style="font-size:11px;color:var(--text-muted);">Total Bins</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:16px;font-weight:800;">${truck.fuel}%</div>
              <div style="font-size:11px;color:var(--text-muted);">Fuel</div>
            </div>
          </div>
          ${truck.route ? `
          <div style="margin-top:12px;padding:8px 10px;background:var(--accent-light);border-radius:8px;font-size:12px;color:var(--accent);display:flex;justify-content:space-between;">
            <span>📍 Route: ${truck.route}</span>
            ${routeInfo ? `<span>${truck.binsCollected}/${truck.totalBins} stops</span>` : ''}
          </div>` : ''}
          <div style="display:flex;gap:6px;margin-top:12px;">
            <button class="btn btn-secondary btn-xs" onclick="toast.info('${truck.id}','Viewing details…',2000)" style="flex:1;justify-content:center;">View</button>
            ${truck.status === 'active' ? `<button class="btn btn-primary btn-xs" onclick="toast.success('Route sent','Updated route dispatched to ${truck.id}',3000)" style="flex:1;justify-content:center;">Update Route</button>` : ''}
          </div>
        </div>`;
            }).join('');
        }

        renderFleetCards();

        // Fleet Map
        const fleetMap = L.map('fleet-map').setView([19.076, 72.877], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 18 }).addTo(fleetMap);

        const truckIcons = {
            active: `<div style="width:26px;height:26px;border-radius:8px;background:#22C55E;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:13px;">🚛</div>`,
            idle: `<div style="width:26px;height:26px;border-radius:8px;background:#94A3B8;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;">🚛</div>`,
            maintenance: `<div style="width:26px;height:26px;border-radius:8px;background:#F59E0B;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;">🚛</div>`
        };

        let fTruckMarkers = {};
        UCData.trucks.forEach(truck => {
            const icon = L.divIcon({ className: '', html: truckIcons[truck.status], iconSize: [26, 26], iconAnchor: [13, 13] });
            const m = L.marker([truck.lat, truck.lng], { icon })
                .bindPopup(`<div style="font-family:Inter,sans-serif;padding:4px;">
        <div style="font-weight:800;">${truck.id}</div>
        <div style="font-size:12px;color:#64748B;">${truck.driver}</div>
        <div style="font-size:12px;margin-top:6px;"><b>Capacity:</b> ${truck.capacity}%</div>
        <div style="font-size:12px;"><b>Status:</b> ${truck.status}</div>
        <div style="font-size:12px;"><b>Fuel:</b> ${truck.fuel}%</div>
      </div>`, { maxWidth: 200 }).addTo(fleetMap);
            fTruckMarkers[truck.id] = m;
        });

        // Routes on fleet map
        const routeColors = ['#3B82F6', '#22C55E', '#8B5CF6'];
        UCData.routes.forEach((r, i) => {
            L.polyline(r.waypoints, { color: routeColors[i], weight: 3, opacity: 0.6, dashArray: '8 5' }).addTo(fleetMap);
        });

        UCSimulation.on('truckMoved', ({ truck }) => {
            const m = fTruckMarkers[truck.id];
            if (m) m.setLatLng([truck.lat, truck.lng]);
        });
        UCSimulation.on('routeProgress', ({ truck }) => {
            renderFleetCards();
        });
        UCSimulation.start();
    </script>
</body>

</html>
