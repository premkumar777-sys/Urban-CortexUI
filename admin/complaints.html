<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Cortex AI — Complaints</title>
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        .complaints-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        @media (max-width: 900px) {
            .complaints-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .filters-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-wrap .input {
            padding-left: 34px;
        }

        .complaint-modal .modal {
            max-width: 500px;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="UCComponents.toggleSidebar()"></div>
        <aside class="sidebar" id="sidebar">
            <div id="sidebar-content"></div>
        </aside>
        <div class="main-content">
            <header class="topbar" id="topbar"></header>
            <main class="page-content">
                <div
                    style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
                    <div>
                        <div style="font-size:22px;font-weight:900;letter-spacing:-0.5px;">Complaints</div>
                        <div style="font-size:13px;color:var(--text-secondary);margin-top:3px;">Citizen-reported issues
                            &amp; resolution tracking</div>
                    </div>
                    <button class="btn btn-primary btn-sm"
                        onclick="toast.info('Export','Complaint report exported',3000)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        Export CSV
                    </button>
                </div>

                <!-- Stats -->
                <div class="complaints-stats" id="cmp-stats"></div>

                <!-- Filters -->
                <div class="filters-bar">
                    <div class="search-wrap">
                        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg></span>
                        <input class="input" id="search-input" placeholder="Search complaints, zones, citizens..."
                            oninput="filterComplaints()" style="padding-left:34px;">
                    </div>
                    <select class="select" id="status-filter" onchange="filterComplaints()" style="width:auto;">
                        <option value="">All Status</option>
                        <option value="open">Open</option>
                        <option value="investigating">Investigating</option>
                        <option value="resolved">Resolved</option>
                    </select>
                    <select class="select" id="priority-filter" onchange="filterComplaints()" style="width:auto;">
                        <option value="">All Priority</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <!-- Table -->
                <div class="table-wrap" id="complaints-table-wrap"></div>

            </main>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-backdrop complaint-modal" id="detail-modal">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="detail-title">Complaint</div>
                    <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;" id="detail-id"></div>
                </div>
                <button class="modal-close" onclick="closeDetailModal()">✕</button>
            </div>
            <div id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        const user = UCAuth.requireAuth(['admin']);
        UCComponents.initTheme();
        document.getElementById('sidebar-content').innerHTML = UCComponents.renderSidebar('complaints');
        document.getElementById('topbar').innerHTML = UCComponents.renderTopbar('Complaints', 'Manage citizen-reported issues');

        function renderStats() {
            const c = UCData.complaints;
            const total = c.length;
            const open = c.filter(x => x.status === 'open').length;
            const investigating = c.filter(x => x.status === 'investigating').length;
            const resolved = c.filter(x => x.status === 'resolved').length;
            const stats = [
                { label: 'Total', val: total, cls: 'stat-accent', icon: '📋' },
                { label: 'Open', val: open, cls: 'stat-danger', icon: '🔴' },
                { label: 'Investigating', val: investigating, cls: 'stat-warning', icon: '🔍' },
                { label: 'Resolved', val: resolved, cls: 'stat-success', icon: '✅' }
            ];
            document.getElementById('cmp-stats').innerHTML = stats.map((s, i) => `
      <div class="stat-card ${s.cls}" style="animation:cardEntry 0.4s ${i * 0.07}s ease both;padding:16px;">
        <div style="font-size:20px;margin-bottom:8px;">${s.icon}</div>
        <div class="stat-value" style="font-size:26px;">${s.val}</div>
        <div class="stat-label">${s.label}</div>
      </div>`).join('');
        }

        function filterComplaints() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const sf = document.getElementById('status-filter').value;
            const pf = document.getElementById('priority-filter').value;
            let data = UCData.complaints.filter(c => {
                const match = !q || [c.id, c.citizen, c.zone, c.type, c.desc].some(v => v.toLowerCase().includes(q));
                const sMatch = !sf || c.status === sf;
                const pMatch = !pf || c.priority === pf;
                return match && sMatch && pMatch;
            });
            renderTable(data);
        }

        function renderTable(data) {
            const wrap = document.getElementById('complaints-table-wrap');
            if (!data.length) { wrap.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-muted);">No complaints found</div>`; return; }
            wrap.innerHTML = `
      <table class="table">
        <thead><tr>
          <th>ID</th><th>Citizen</th><th>Zone</th><th>Type</th>
          <th>Priority</th><th>Status</th><th>Date</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${data.map(c => `
            <tr>
              <td style="font-weight:700;color:var(--accent);">${c.id}</td>
              <td>${c.citizen}</td>
              <td>${c.zone}</td>
              <td>${c.type}</td>
              <td><span class="badge ${c.priority === 'high' ? 'badge-danger' : c.priority === 'medium' ? 'badge-warning' : 'badge-muted'}">${c.priority}</span></td>
              <td><span class="badge ${UCData.getStatusBadge(c.status)}">${c.status}</span></td>
              <td style="color:var(--text-muted);font-size:12px;">${UCData.formatTime(c.date)}</td>
              <td>
                <div style="display:flex;gap:5px;">
                  <button class="btn btn-secondary btn-xs" onclick="openDetail('${c.id}')">View</button>
                  ${c.status !== 'resolved' ? `<button class="btn btn-success btn-xs" onclick="resolve('${c.id}')">Resolve</button>` : ''}
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
        }

        function openDetail(id) {
            const c = UCData.complaints.find(x => x.id === id);
            if (!c) return;
            document.getElementById('detail-title').textContent = c.type + ' Complaint';
            document.getElementById('detail-id').textContent = c.id + ' · ' + c.zone;
            document.getElementById('modal-body').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div><div class="input-label">Citizen</div><div style="font-size:14px;font-weight:600;margin-top:4px;">${c.citizen}</div></div>
          <div><div class="input-label">Zone</div><div style="font-size:14px;font-weight:600;margin-top:4px;">${c.zone}</div></div>
          <div><div class="input-label">Priority</div><div style="margin-top:4px;"><span class="badge ${c.priority === 'high' ? 'badge-danger' : c.priority === 'medium' ? 'badge-warning' : 'badge-muted'}">${c.priority}</span></div></div>
          <div><div class="input-label">Status</div><div style="margin-top:4px;"><span class="badge ${UCData.getStatusBadge(c.status)}">${c.status}</span></div></div>
        </div>
        <div>
          <div class="input-label">Description</div>
          <div style="font-size:14px;line-height:1.6;color:var(--text-secondary);margin-top:6px;padding:12px;background:var(--bg-tertiary);border-radius:8px;">${c.desc}</div>
        </div>
        <div class="input-group">
          <label class="input-label">Update Status</label>
          <select class="select" id="new-status">
            <option value="open" ${c.status === 'open' ? 'selected' : ''}>Open</option>
            <option value="investigating" ${c.status === 'investigating' ? 'selected' : ''}>Investigating</option>
            <option value="resolved" ${c.status === 'resolved' ? 'selected' : ''}>Resolved</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label">Admin Note (optional)</label>
          <textarea class="input" rows="3" placeholder="Add investigation notes…" style="resize:none;"></textarea>
        </div>
      </div>`;
            document.getElementById('modal-footer').innerHTML = `
      <button class="btn btn-secondary" onclick="closeDetailModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveStatus('${id}')">Save Changes</button>`;
            document.getElementById('detail-modal').classList.add('open');
        }

        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('open'); }

        function saveStatus(id) {
            const c = UCData.complaints.find(x => x.id === id);
            const newStatus = document.getElementById('new-status').value;
            if (c) { c.status = newStatus; }
            closeDetailModal();
            toast.success('Status updated', `${id} marked as ${newStatus}`, 3000);
            renderStats();
            filterComplaints();
        }

        function resolve(id) {
            const c = UCData.complaints.find(x => x.id === id);
            if (c) c.status = 'resolved';
            toast.success('Complaint resolved', `${id} has been marked as resolved`, 3000);
            renderStats();
            filterComplaints();
        }

        renderStats();
        filterComplaints();
    </script>
</body>

</html>
